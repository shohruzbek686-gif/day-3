<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        div{
            height: 300px;
            width: 300px;
            background-color: red;
            transition: 1s ease-in-out;
        }
        div:hover{
            background-color: blue;
            width: 460px;
            height: 460px;
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>

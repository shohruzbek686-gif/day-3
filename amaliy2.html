<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning & Glass Project</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-gradient: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            --glass: rgba(255, 255, 255, 0.1); 
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5); 
        }

        
        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: var(--accent-gradient); 
            font-family: 'Arial', sans-serif;
        }

        
        .card {
            position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            
            width: 320px;
            padding: 30px;
            background: var(--glass);
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            color: white;
            overflow: hidden; 
        }

        
        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        
        .card > h1 { 
            margin: 15px 0 5px;
            font-size: 1.5rem;
        }

        .card p { 
            opacity: 0.7; 
            font-size: 0.9rem;
        }

       
        a{
            color: #fbbf24;
            text-decoration: none;
            font-size: 0.8rem;
            display: block;
            margin-top: 10px;
        }

        .but {
            margin: 20px 0;
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
        }

        .popup {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 37, 52, 0.95);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 40px;
        }

        .card:hover .popup {
            bottom: 0;
        }
        .slide{
            margin-top: 20px; 
            font-size: 0.7rem;
        }
        ul{
            list-style: none; 
            padding: 0
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="burger.jpg">

        <h1>Creative Studio</h1>
        <p>Visual Design & Web Interaction</p>

        <a href="#">Search My Work</a>

        <button class="but">Hello World</button>

        <div class="popup">
            <h2>Our Services</h2>
            <ul>
                <li> UI/UX Design</li>
                <li> CSS Animations</li>
                <li> Web Development</li>
            </ul>
            <p class="slide">Slide out to close</p>
        </div>
    </div>

</body>
</html>
